services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /bin/sh
      - -lc
      - |
        npm run db:push
        if [ ! -f /app/data/.seeded ]; then
          npm run db:seed
          touch /app/data/.seeded
        fi
        npm run start:server
    environment:
      DATABASE_URL: file:/app/data/dev.db
      API_PORT: 3001
      API_HOST: 0.0.0.0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "3001:3001"
    volumes:
      - insora_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - npm
      - run
      - dev:client
      - --
      - --host
      - 0.0.0.0
      - --port
      - "4173"
    environment:
      VITE_API_PROXY_TARGET: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4173:4173"

volumes:
  insora_data:
